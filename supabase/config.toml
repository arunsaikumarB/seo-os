# A string used to distinguish different Supabase projects on the same host. Defaults to the workspace folder name when running locally.
project_id = "seo-os"

[api]
enabled = true
port = 54321
schemas = ["public", "pgboss"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]

[auth.email]
enable_signup = true
