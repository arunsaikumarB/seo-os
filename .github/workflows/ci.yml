name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Migration sequence check
        run: node scripts/check-migrations.mjs

      - name: Install Playwright Chromium
        run: node node_modules/playwright/cli.js install chromium
        env:
          PLAYWRIGHT_CHROMIUM_USE_HEADLESS_SHELL: '0'

      - name: Assert Playwright Chromium present
        run: node scripts/check-playwright-chromium.mjs
        env:
          PLAYWRIGHT_CHROMIUM_USE_HEADLESS_SHELL: '0'

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Local API health smoke
        run: node scripts/smoke-local-health.mjs

      - name: Journey smoke (offline contract)
        run: node scripts/smoke-journey.mjs

  deploy-staging:
    name: Deploy staging
    needs: quality
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for deploy
        run: npm run build

      - name: Deploy API to Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        run: |
          npm install -g @railway/cli
          railway up --service api --detach
        working-directory: apps/api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Web to Netlify
        if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
        run: npx netlify-cli deploy --prod --dir=apps/web/dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Staging deploy note
        if: ${{ secrets.RAILWAY_TOKEN == '' && secrets.NETLIFY_AUTH_TOKEN == '' }}
        run: |
          echo "::warning::Staging secrets not configured. See docs/deployment.md to enable auto-deploy."

  smoke-staging:
    name: Staging health smoke
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test /health
        if: ${{ secrets.STAGING_API_URL != '' }}
        run: STAGING_API_URL=${{ secrets.STAGING_API_URL }} node scripts/smoke-staging.mjs

      - name: Staging smoke skipped
        if: ${{ secrets.STAGING_API_URL == '' }}
        run: |
          echo "::warning::STAGING_API_URL not set. Configure after first Railway deploy. See docs/deployment.md."
