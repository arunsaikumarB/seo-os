# When Netlify Base directory = repo root:
#   Build command: npm ci && npm run build --workspace=@seo-os/shared && npm run build --workspace=@seo-os/web
#   Publish directory: apps/web/dist
#   Env: VITE_API_URL=https://api-production-48c9e.up.railway.app (required — never localhost)
#
# When Base directory = apps/web, set Publish directory to "dist" in the Netlify UI.
[build]
  command = "npm run build --workspace=@seo-os/web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # SPA CSP: allow self + API + Supabase auth; tighten further per tenant if needed
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
