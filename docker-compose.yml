# Local development — Supabase CLI preferred for full stack.
# Optional: Postgres + Ollama for offline AI fallback (Sprint 4+).

services:
  postgres:
    image: postgres:15-alpine
    container_name: seo-os-postgres
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - seo_os_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment when using local Ollama (Sprint 4+)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: seo-os-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - seo_os_ollama:/root/.ollama

volumes:
  seo_os_pg_data:
  # seo_os_ollama:
