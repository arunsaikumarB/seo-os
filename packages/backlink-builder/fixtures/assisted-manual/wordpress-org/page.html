<!DOCTYPE html>
<html>
<body>
  <form>
    <label for="plugin_name">Title</label>
    <input id="plugin_name" name="plugin_name" type="text" required />
    <label for="plugin_uri">Website URL</label>
    <input id="plugin_uri" name="plugin_uri" type="url" required />
    <label for="description">Description</label>
    <textarea id="description" name="description" required></textarea>
    <label for="tags">Tags</label>
    <input id="tags" name="tags" type="text" />
    <button type="submit">Upload</button>
  </form>
</body>
</html>
