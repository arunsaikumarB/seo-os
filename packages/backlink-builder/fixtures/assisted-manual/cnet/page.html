<!DOCTYPE html>
<html>
<body>
  <form id="submit-product">
    <label for="product_name">Title</label>
    <input id="product_name" name="product_name" type="text" required />
    <label for="product_url">Website URL</label>
    <input id="product_url" name="product_url" type="url" required />
    <label for="summary">Short description</label>
    <textarea id="summary" name="summary" maxlength="160" required></textarea>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
